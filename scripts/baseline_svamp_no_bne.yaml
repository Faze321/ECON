runner: "episode_runner"
mac: "baseline_mac"
learner: "noop_learner"

t_max: 10
test_nepisode: 100

n_agents: 3
n_actions: 2
belief_dim: 128
batch_size_run: 1
state_shape: 1024
max_seq_length: 1024
commitment_embedding_dim: 768

llm_model_name: "gpt2"
llm_api_key: "${OPENROUTER_API_KEY}"
coordinator_model: "meta-llama/llama-3.3-70b-instruct"
executor_model: "meta-llama/llama-3.1-8b-instruct"
commitment_embedding_model_name: "BAAI/bge-large-en-v1.5"

llm:
  llm_api_key: "${OPENROUTER_API_KEY}"
  base_url: "https://openrouter.ai/api/v1"
  coordinator_model: "meta-llama/llama-3.3-70b-instruct"
  executor_model: "meta-llama/llama-3.1-8b-instruct"
  strategy_max_tokens: 256
  executor_max_tokens: 1024
  commitment_max_tokens: 256
  coordinator_temperature: 0.1
  coordinator_top_p: 0.9
  executor_temperature: 0.2
  executor_top_p: 0.9

env: "huggingface_dataset_env"
env_args:
  hf_dataset_path: "ChilleD/SVAMP"
  hf_dataset_config_name: null
  dataset_split: "train"
  question_field_name: "question_concat"
  answer_field_name: "answer"
  compute_reward: false
  max_question_length: 768
  max_answer_length: 2048
  dataset_streaming: false
  use_random_sampling: false
  random_without_replacement: true
  loop_dataset: true
  use_dataset_episode: false
  max_rounds: 1

env_args_test:
  dataset_split: "test"
  question_field_name: "question_concat"
  answer_field_name: "answer"

bne:
  enabled: false
  train_refine: false
  refine_at_infer: false
  max_iterations_train: 0
  max_iterations_infer: 0

system:
  use_cuda: true
  device_num: 0
  seed: 42
  debug: false

logging:
  use_tensorboard: false
  log_interval: 1
  save_model: false
  save_model_interval: 1000000
  log_path: "./logs_svamp_no_bne"
  experiment_name: "baseline_svamp_no_bne"

use_replay: false
